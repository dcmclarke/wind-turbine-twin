name: Icing Detector Evaluation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-h5py-numpy-sklearn-matplotlib-pandas

      - name: Install dependencies
        run: pip install h5py numpy scikit-learn matplotlib pandas

      - name: Download AV-7 dataset
        run: |
          pip install zenodo-get
          mkdir -p data
          zenodo_get 8223010 -o data

      - name: Run evaluation against baseline
        run: python evaluation/evaluate.py --baseline evaluation/metrics_baseline.json
